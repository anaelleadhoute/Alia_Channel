# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name alia-channel.com www.alia-channel.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Main
server {
    listen 443 ssl;
    server_name alia-channel.com www.alia-channel.com;

    ssl_certificate     /etc/letsencrypt/live/alia-channel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alia-channel.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Dashboard
    location / {
        proxy_pass http://alia_dashboard:80;
        proxy_set_header Host $host;
    }

    # Backend API
    location /api/ {
        proxy_pass http://alia_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # n8n
    location /n8n/ {
        proxy_pass http://alia_n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
